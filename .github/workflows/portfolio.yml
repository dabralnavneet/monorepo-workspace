name: Deploy Portfolio site to Pages

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portfolio
        run: pnpm --filter portfolio build

      - name: Build CallbackOS Web
        run: pnpm --filter @callbackos/web build

      - name: Build Digital Twin Landing
        run: pnpm --filter @digital-twin/landing build

      - name: Merge build outputs
        run: |
          # The portfolio dist folder is already created by the portfolio build.
          # Create subdirectories for the other apps.
          mkdir -p apps/portfolio/dist/callbackos
          mkdir -p apps/portfolio/dist/digital-twin

          # Copy Next.js static export (out/) to the callbackos folder
          cp -r apps/callbackos/web/out/* apps/portfolio/dist/callbackos/

          # Copy Digital Twin Landing standard HTML files (exclude package.json/node_modules if any exist)
          # We just copy all files manually as it doesn't have a real build
          cp apps/digital-twin-landing/*.html apps/portfolio/dist/digital-twin/
          cp -r apps/digital-twin-landing/assets apps/portfolio/dist/digital-twin/
          cp -r apps/digital-twin-landing/styles.css apps/portfolio/dist/digital-twin/
          cp -r apps/digital-twin-landing/script.js apps/portfolio/dist/digital-twin/
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/portfolio/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
